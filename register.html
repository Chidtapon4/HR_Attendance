<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>ลงทะเบียนพนักงาน</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="card">
    <section id="loading" class="state">
      <div class="spinner"></div>
      <p>กำลังเชื่อมต่อ...</p>
    </section>

    <section id="error" class="state hidden">
      <div class="icon-bad">!</div>
      <p id="error-msg"></p>
      <button id="retry-btn" class="btn btn-ghost">ลองใหม่</button>
    </section>

    <!-- ฟอร์มลงทะเบียน -->
    <section id="form" class="state hidden">
      <header class="head">
        <h1>ลงทะเบียนพนักงาน</h1>
        <p class="dept">กรอกข้อมูลเพื่อขอเข้าใช้งานระบบ</p>
      </header>

      <label class="field">
        <span>ชื่อ-นามสกุล <b class="req">*</b></span>
        <input type="text" id="f-name" placeholder="เช่น สมชาย ใจดี" />
      </label>
      <label class="field">
        <span>แผนก</span>
        <input type="text" id="f-dept" placeholder="เช่น ฝ่ายขาย" />
      </label>
      <label class="field">
        <span>เบอร์โทร</span>
        <input type="tel" id="f-phone" placeholder="08x-xxx-xxxx" />
      </label>

      <label class="consent">
        <input type="checkbox" id="f-consent" />
        <span>ฉันยินยอมให้บริษัทเก็บข้อมูลส่วนบุคคล (ชื่อ-นามสกุล, LINE user id,
          พิกัด GPS และรูปเซลฟี่ตอนลงเวลา) เพื่อการจัดการเวลาทำงานเท่านั้น
          ตาม พ.ร.บ. คุ้มครองข้อมูลส่วนบุคคล (PDPA)</span>
      </label>

      <button id="submit-btn" class="btn btn-primary">ส่งคำขอลงทะเบียน</button>
      <p id="status-line" class="status-line"></p>
    </section>

    <!-- ส่งสำเร็จ -->
    <section id="success" class="state hidden">
      <div class="icon-ok">&#10003;</div>
      <h2>ส่งคำขอแล้ว</h2>
      <p id="success-detail" class="dept"></p>
      <button id="done-btn" class="btn btn-ghost">เสร็จสิ้น</button>
    </section>
  </main>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/liff-init.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
